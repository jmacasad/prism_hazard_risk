
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — UI Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    padding: 32px;
  }

  /* ── Header ── */
  .prism-header {
    background: #304E4D;
    padding: 24px 52px;
    border-radius: 12px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .prism-header h1 {
    color: #fff;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1;
  }
  .prism-header p {
    color: #D2B589;
    margin: 10px 0 0;
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  /* ── Search row ── */
  .search-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 12px;
  }
  .search-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .search-row input:focus {
    border-color: #304E4D;
    box-shadow: 0 0 0 2px rgba(48,78,77,0.15);
  }
  .search-row label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }
  .input-wrap { flex: 1; }

  /* ── SEARCH button ── */
  #run-btn {
    background: #D2B589;
    color: #304E4D;
    border: none;
    border-radius: 999px;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 32px;
    width: fit-content;
    min-width: 140px;
    font-size: 14px;
    cursor: pointer;
  }
  #run-btn:hover { opacity: 0.9; }
</style>
</head>

  <!-- SEARCH ROW -->

    <div class="input-wrap">
